<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Financeiro">
<title>Financeiro Pessoal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f5f5f5;--bg3:#e8e8e8;
  --text:#111;--text2:#666;--text3:#aaa;
  --border:#e0e0e0;
  --green:#1a7f3c;--green-bg:#e8f5ee;
  --red:#c0392b;--red-bg:#fdecea;
  --blue:#1a5fa8;--blue-bg:#e8f0fb;
  --radius:12px;--radius-sm:8px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
  --border:#3a3a3c;
  --green:#34c759;--green-bg:#0d2e1a;
  --red:#ff453a;--red-bg:#2d1210;
  --blue:#0a84ff;--blue-bg:#0d1f3c;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh}
.app{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
.header{background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px 10px;position:sticky;top:0;z-index:10}
.h-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.h-title{font-size:19px;font-weight:600;color:var(--text)}
.h-date{font-size:12px;color:var(--text2);margin-top:2px}
.h-sync{font-size:12px;color:var(--text2)}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.metric{background:var(--bg2);border-radius:var(--radius-sm);padding:7px 8px;text-align:center}
.ml{font-size:10px;color:var(--text2);margin-bottom:1px}
.mv{font-size:15px;font-weight:600}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:11px 2px;border:none;background:transparent;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.body{flex:1;padding:14px;overflow-y:auto}
.panel{display:none}
.panel.on{display:block}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.slabel{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.fg{margin-bottom:11px}
.fg label{display:block;font-size:13px;color:var(--text2);margin-bottom:4px}
.fg input,.fg select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:var(--bg);color:var(--text);font-family:inherit;outline:none}
.ttoggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.tbtn{padding:11px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg2);font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--text2)}
.tbtn.ae{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.tbtn.as{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.sbtn{width:100%;padding:13px;border-radius:var(--radius-sm);border:none;background:var(--blue);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:2px}
.row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.rdesc{font-size:14px;font-weight:500;color:var(--text)}
.rmeta{font-size:12px;color:var(--text2);margin-top:1px}
.rval{font-size:15px;font-weight:600;white-space:nowrap;margin-left:10px}
.ve{color:var(--green)}.vs{color:var(--red)}
.badge{display:inline-block;font-size:11px;padding:1px 6px;border-radius:99px;margin-right:3px;font-weight:500}
.bp{background:var(--blue-bg);color:var(--blue)}
.be2{background:var(--green-bg);color:var(--green)}
.xbtn{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:2px 6px;margin-left:2px;line-height:1}
.filtros{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.filtros select{padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--bg);color:var(--text);font-family:inherit}
.crow{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)}
.cleft{display:flex;align-items:center;gap:10px}
.cleft input[type=checkbox]{width:19px;height:19px;accent-color:var(--green);cursor:pointer}
.cname{font-size:14px;color:var(--text)}
.cname.done{text-decoration:line-through;opacity:.45}
.sumrow{display:flex;justify-content:space-between;padding:5px 0}
.suml{font-size:13px;color:var(--text2)}
.sumv{font-size:14px;font-weight:600}
.divider{height:1px;background:var(--border);margin:8px 0}
.sbar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:4px}
.sfill{height:100%;background:var(--blue);border-radius:3px}
.srow{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:9px 18px;border-radius:99px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999}
.toast.on{opacity:1}
.gbtn{display:flex;align-items:center;gap:10px;width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--text);justify-content:center}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="h-top">
      <div><div class="h-title">Financeiro</div><div class="h-date" id="hdate"></div></div>
      <div class="h-sync" id="hsync"></div>
    </div>
    <div class="metrics">
      <div class="metric"><div class="ml">Disponível</div><div class="mv" id="mdisp">R$ 0</div></div>
      <div class="metric"><div class="ml">Entradas</div><div class="mv ve" id="ment">R$ 0</div></div>
      <div class="metric"><div class="ml">Saídas</div><div class="mv vs" id="msai">R$ 0</div></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" id="t0" onclick="go(0)">Lançar</button>
    <button class="tab" id="t1" onclick="go(1)">Histórico</button>
    <button class="tab" id="t2" onclick="go(2)">Fixas</button>
    <button class="tab" id="t3" onclick="go(3)">Conta</button>
  </div>
  <div class="body">
    <div class="panel on" id="p0">
      <div class="card">
        <div class="ttoggle">
          <button class="tbtn ae" id="be" onclick="setTipo('e')">+ Entrada</button>
          <button class="tbtn" id="bs" onclick="setTipo('s')">- Saída</button>
        </div>
        <div class="fg"><label>Descrição</label><input id="fdesc" type="text" placeholder="Ex: PIX oficina, Nubank..." autocomplete="off"></div>
        <div class="fg"><label>Valor (R$)</label><input id="fval" type="number" placeholder="0,00" step="0.01" min="0" inputmode="decimal"></div>
        <div class="fg"><label>Categoria</label>
          <select id="fcat"><option>Oficina</option><option>Shopee</option><option>Mercado Livre</option><option>Cartão</option><option>Conta Fixa</option><option>Peças / Estoque</option><option>Outros</option></select>
        </div>
        <div class="fg"><label>Conta</label>
          <select id="fconta"><option>Mercado Pago</option><option>C6 Bank</option><option>Dinheiro</option></select>
        </div>
        <div class="fg"><label>Pessoal ou empresarial?</label>
          <select id="fsub"><option>Pessoal</option><option>Empresarial</option></select>
        </div>
        <button class="sbtn" onclick="salvar()">Salvar</button>
      </div>
      <div class="card">
        <div class="slabel">Saldos por conta</div>
        <div id="saldos"></div>
      </div>
    </div>

    <div class="panel" id="p1">
      <div class="filtros">
        <select id="ft" onchange="renderHist()"><option value="">Todos</option><option value="e">Entradas</option><option value="s">Saídas</option></select>
        <select id="fc" onchange="renderHist()"><option value="">Todas cats.</option><option>Oficina</option><option>Shopee</option><option>Mercado Livre</option><option>Cartão</option><option>Conta Fixa</option><option>Peças / Estoque</option><option>Outros</option></select>
      </div>
      <div class="card" id="hist"></div>
    </div>

    <div class="panel" id="p2">
      <div class="card">
        <div class="slabel">Contas fixas do mês</div>
        <div id="fixlst"></div>
        <div class="divider"></div>
        <div class="sumrow"><span class="suml">Total</span><span class="sumv vs" id="ftotal"></span></div>
        <div class="sumrow"><span class="suml">Pago</span><span class="sumv ve" id="fpago"></span></div>
        <div class="sumrow"><span class="suml">Pendente</span><span class="sumv" id="fpend"></span></div>
        <button class="gbtn" style="margin-top:15px; border-color:var(--blue); color:var(--blue)" onclick="novoMes()">Iniciar Novo Mês</button>
      </div>
    </div>

    <div class="panel" id="p3">
      <div class="card" id="asec">
        <div style="text-align:center;padding:16px 0 20px">
          <div style="font-size:40px;margin-bottom:12px">&#128202;</div>
          <div style="font-size:17px;font-weight:600;margin-bottom:8px;color:var(--text)">Conectar ao Google Sheets</div>
          <button class="gbtn" onclick="loginGoogle()">Entrar com Google</button>
        </div>
      </div>
      <div class="card" id="usec" style="display:none">
        <div class="slabel">Conta conectada</div>
        <div class="row"><div><div class="rdesc" id="uname"></div><div class="rmeta" id="uemail"></div></div></div>
        <button onclick="logout()" style="width:100%;margin-top:12px;padding:11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--red);font-size:15px;cursor:pointer;font-family:inherit">Desconectar</button>
      </div>
      <div class="card">
        <div class="slabel">Saldos iniciais</div>
        <div id="sedit"></div>
        <button class="sbtn" onclick="saveSaldos()">Atualizar saldos</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var CLIENT_ID='107902657965-3dr3ihr019evgvfbmcs8aainuvqbi4v9.apps.googleusercontent.com';
var SCOPES='https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file';
var FIXAS=[{n:'Luz (CEMIG)',v:166},{n:'Agua (COPASA)',v:60},{n:'MEI (DAS)',v:87.05},{n:'Internet',v:54.5},{n:'Plano de Saude',v:300},{n:'Celular',v:60}];
var CDEF={'Mercado Pago':3185.35,'C6 Bank':3988.88,'Dinheiro':0};

var tipo='e', token=null, sheetId=localStorage.getItem('sheetId')||null;
var lancs=[], fixPagas=JSON.parse(localStorage.getItem('fp')||'[]');
var cbase=JSON.parse(localStorage.getItem('cb')||JSON.stringify(CDEF));

function fmt(v){return 'R$ '+Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fd(){return new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});}

function showToast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg; el.className='toast on';
  setTimeout(function(){el.className='toast';},2000);
}

// ABA: NAVEGAÇÃO
function go(i){
  var tabs=document.querySelectorAll('.tab');
  var panels=document.querySelectorAll('.panel');
  for(var j=0;j<tabs.length;j++){
    tabs[j].classList.toggle('on', i===j);
    panels[j].classList.toggle('on', i===j);
  }
  if(i===1) renderHist();
  if(i===2) renderFixas();
  if(i===3) renderSedit();
}

function setTipo(t){
  tipo=t;
  document.getElementById('be').className='tbtn'+(t==='e'?' ae':'');
  document.getElementById('bs').className='tbtn'+(t==='s'?' as':'');
  document.getElementById('fcat').value=t==='e'?'Oficina':'Cartão';
}

// CÁLCULOS
function calcSaldos(){
  var s={}, k=Object.keys(cbase);
  for(var i=0;i<k.length;i++) s[k[i]]=cbase[k[i]];
  for(var i=0;i<lancs.length;i++){
    var l=lancs[i];
    if(s[l.conta]!==undefined) s[l.conta]+=l.tipo==='e'?l.val:-l.val;
  }
  return s;
}

function renderMetrics(){
  var s=calcSaldos(), k=Object.keys(s), tot=0, ent=0, sai=0;
  for(var i=0;i<k.length;i++) tot+=s[k[i]];
  for(var i=0;i<lancs.length;i++) lancs[i].tipo==='e'?ent+=lancs[i].val:sai+=lancs[i].val;
  document.getElementById('mdisp').textContent=fmt(tot);
  document.getElementById('ment').textContent=fmt(ent);
  document.getElementById('msai').textContent=fmt(sai);
}

function renderSaldos(){
  var s=calcSaldos(), k=Object.keys(s), tot=0;
  for(var i=0;i<k.length;i++) tot+=s[k[i]];
  var h='';
  for(var i=0;i<k.length;i++){
    var n=k[i], v=s[n], pct=tot>0?Math.max(0,Math.min(100,v/tot*100)):0;
    h+='<div style="margin-bottom:12px"><div class="srow"><span style="font-size:14px">'+n+'</span><span style="font-size:14px;font-weight:600">'+fmt(v)+'</span></div><div class="sbar"><div class="sfill" style="width:'+pct+'%"></div></div></div>';
  }
  document.getElementById('saldos').innerHTML=h;
}

// HISTÓRICO
function renderHist(){
  var ft=document.getElementById('ft').value, fc=document.getElementById('fc').value;
  var list=lancs.slice().reverse();
  if(ft) list=list.filter(function(l){return l.tipo===ft;});
  if(fc) list=list.filter(function(l){return l.cat===fc;});
  var h='';
  if(!list.length) h='<div style="text-align:center;padding:20px;color:var(--text2)">Nada aqui ainda</div>';
  for(var i=0;i<list.length;i++){
    var l=list[i];
    h+='<div class="row"><div style="flex:1"><div class="rdesc">'+l.desc+'</div><div class="rmeta">'+l.cat+' - '+l.conta+' - '+l.data+'</div></div><div style="display:flex;align-items:center"><span class="rval '+(l.tipo==='e'?'ve':'vs')+'">'+(l.tipo==='e'?'+':'-')+fmt(l.val)+'</span><button class="xbtn" onclick="del('+l.ts+')">&times;</button></div></div>';
  }
  document.getElementById('hist').innerHTML=h;
}

// FIXAS (EDITÁVEIS E LANÇÁVEIS)
function renderFixas() {
  var tp=0, tpago=0, h='';
  for (var i=0; i<FIXAS.length; i++) {
    var fx=FIXAS[i], p=fixPagas.indexOf(i)>=0;
    tp+=fx.v; if(p) tpago+=fx.v;
    h+='<div class="crow"><div class="cleft"><input type="checkbox" '+(p?'checked disabled':'')+' onchange="confirmarFixa('+i+')"><span class="cname '+(p?'done':'')+'">'+fx.n+'</span></div><div><input type="number" value="'+fx.v.toFixed(2)+'" step="0.01" style="width:75px;border:none;background:transparent;text-align:right;font-weight:600;color:var(--text);font-family:inherit" '+(p?'disabled':'')+' onchange="altFixV('+i+',this.value)"></div></div>';
  }
  document.getElementById('fixlst').innerHTML=h;
  document.getElementById('ftotal').textContent=fmt(tp);
  document.getElementById('fpago').textContent=fmt(tpago);
  document.getElementById('fpend').textContent=fmt(tp-tpago);
}

function altFixV(i,v){ FIXAS[i].v = parseFloat(v)||0; renderFixas(); }

function confirmarFixa(i) {
  var fx=FIXAS[i];
  if(confirm("Deseja pagar e lançar "+fx.n+" ("+fmt(fx.v)+") no histórico?")) {
    var entry={desc:"Fixo: "+fx.n, val:fx.v, cat:"Conta Fixa", conta:"Mercado Pago", sub:"Pessoal", tipo:'s', data:fd(), ts:Date.now()};
    lancs.push(entry);
    fixPagas.push(i);
    localStorage.setItem('fp', JSON.stringify(fixPagas));
    renderMetrics(); renderSaldos(); renderFixas();
    if(token && sheetId) pushRow(entry);
    showToast("Pago!");
  } else { renderFixas(); }
}

function novoMes(){
  if(confirm("Limpar marcações para um novo mês?")){
    fixPagas=[]; localStorage.setItem('fp', JSON.stringify(fixPagas));
    renderFixas(); showToast("Iniciado!");
  }
}

// SALVAR MANUAL
function salvar(){
  var d=document.getElementById('fdesc').value, v=parseFloat(document.getElementById('fval').value);
  if(!d||!v) return showToast("Preencha tudo");
  var entry={desc:d, val:v, cat:document.getElementById('fcat').value, conta:document.getElementById('fconta').value, sub:document.getElementById('fsub').value, tipo:tipo, data:fd(), ts:Date.now()};
  lancs.push(entry);
  document.getElementById('fdesc').value=''; document.getElementById('fval').value='';
  renderMetrics(); renderSaldos(); showToast("Salvo!");
  if(token && sheetId) pushRow(entry);
}

function del(ts){
  lancs=lancs.filter(function(l){return l.ts!==ts});
  renderMetrics(); renderSaldos(); renderHist();
  showToast("Removido");
}

function renderSedit(){
  var k=Object.keys(cbase), h='';
  for(var i=0; i<k.length; i++){
    h+='<div class="fg"><label>'+k[i]+'</label><input type="number" id="sb_'+i+'" value="'+cbase[k[i]].toFixed(2)+'" step="0.01"></div>';
  }
  document.getElementById('sedit').innerHTML=h;
}

function saveSaldos(){
  var k=Object.keys(cbase);
  for(var i=0; i<k.length; i++){
    var el=document.getElementById('sb_'+i);
    if(el) cbase[k[i]]=parseFloat(el.value)||0;
  }
  localStorage.setItem('cb', JSON.stringify(cbase));
  renderMetrics(); renderSaldos(); showToast("Atualizado!");
}

// GOOGLE SYNC (BÁSICO)
function loginGoogle(){
  var p=new URLSearchParams({client_id:CLIENT_ID,redirect_uri:location.href.split('#')[0],response_type:'token',scope:SCOPES});
  location.href='https://accounts.google.com/o/oauth2/v2/auth?'+p;
}

function handleAuth(){
  var p=new URLSearchParams(location.hash.substring(1));
  var t=p.get('access_token');
  if(!t) return;
  token=t; history.replaceState(null,'',location.pathname);
  document.getElementById('asec').style.display='none';
  document.getElementById('usec').style.display='block';
  showToast("Conectado ao Google");
}

function pushRow(e){
  if(!token||!sheetId) return;
  fetch('https://sheets.googleapis.com/v4/spreadsheets/'+sheetId+'/values/Lancamentos!A:H:append?valueInputOption=RAW', {
    method:'POST', headers:{'Authorization':'Bearer '+token},
    body:JSON.stringify({values:[[e.data,e.desc,e.cat,e.conta,e.tipo,e.sub,e.tipo==='e'?e.val:-e.val,e.ts]]})
  });
}

// INIT
var now=new Date();
var DN=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
var MN=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
document.getElementById('hdate').textContent=DN[now.getDay()]+', '+now.getDate()+' de '+MN[now.getMonth()];

handleAuth();
renderMetrics();
renderSaldos();
</script>
</body>
</html>
